<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎁 СЮРПРИЗ</title>
<style>
* { margin:0; padding:0; }
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  font-size: 40px;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
#btn {
  margin-top: 40px;
  padding: 20px 40px;
  background: red;
  color: white;
  font-size: 30px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  animation: pulse 0.5s infinite alternate;
}
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
#result {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  background: black;
  z-index: 999;
}
#result img {
  max-width: 90%;
  max-height: 70vh;
  border-radius: 20px;
  border: 5px solid red;
}
#result h1 {
  color: red;
  font-size: 80px;
  text-align: center;
  margin-top: 20px;
  text-shadow: 0 0 20px red;
  animation: blink 0.5s infinite;
}
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}
</style>
</head>
<body>

<div id="content">🎁 ПРИВЕТ, ТОЛИК! 🎁</div>
<button id="btn">👉 НАЖМИ СЮДА 👈</button>

<!-- Скрытый блок с результатом -->
<div id="result">
  <img src="tolik.jpg" alt="Толик">
  <h1>ТОЛИК УЕБАН!</h1>
</div>

<!-- Звук -->
<audio id="scary" preload="auto" loop>
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
document.getElementById('btn').onclick = function() {
  // Звук
  var audio = document.getElementById('scary');
  audio.volume = 1;
  audio.play();
  
  // Показываем фото и надпись
  document.getElementById('result').style.display = 'flex';
  document.getElementById('content').style.display = 'none';
  document.getElementById('btn').style.display = 'none';
  
  // Вибрация
  if (navigator.vibrate) navigator.vibrate(500);
  
  // Блокировка выхода
  window.history.pushState(null, null, window.location.href);
  window.onpopstate = function() {
    audio.play();
    alert("🔊 НЕ ПЫТАЙСЯ ВЫЙТИ!");
    window.history.pushState(null, null, window.location.href);
  };
  
  window.onbeforeunload = function(e) {
    audio.play();
    e.preventDefault();
    e.returnValue = 'Ты уверен?';
    return 'Ты уверен?';
  };
  
  setInterval(function() {
    window.history.pushState(null, null, window.location.href);
  }, 3000);
};
</script>

</body>
</html>
