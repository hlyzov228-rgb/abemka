<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎁 СЮРПРИЗ</title>
<style>
* { margin:0; padding:0; }
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  font-size: 40px;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
#btn {
  margin-top: 40px;
  padding: 20px 40px;
  background: red;
  color: white;
  font-size: 30px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  animation: pulse 0.5s infinite alternate;
}
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
</style>
</head>
<body>
<div id="content">🎁 ТЫ ВЫИГРАЛ ПРИЗ! 🎁</div>
<button id="btn">👉 ЗАБРАТЬ ПОДАРОК 👈</button>

<!-- НОВЫЙ ИСТОЧНИК ЗВУКА (надёжный) -->
<audio id="scary" preload="auto" loop>
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
document.getElementById('btn').onclick = function() {
  var audio = document.getElementById('scary');
  audio.volume = 1;
  audio.play();
  document.body.style.backgroundImage = "url('https://i.imgur.com/4tR6X8D.jpeg')";
  document.body.style.backgroundSize = "cover";
  document.getElementById('content').innerHTML = "👻 BOO!";
  document.getElementById('content').style.color = "red";
  document.getElementById('content').style.fontSize = "100px";
  document.getElementById('btn').style.display = "none";
  if (navigator.vibrate) navigator.vibrate(500);
  
  // Блокировка кнопки "Назад"
  window.history.pushState(null, null, window.location.href);
  window.onpopstate = function() {
    audio.play();
    alert("🔊 НЕ ПЫТАЙСЯ ВЫЙТИ! ДОСМОТРИ ДО КОНЦА!");
    window.history.pushState(null, null, window.location.href);
  };
  
  // Блокировка закрытия вкладки
  window.onbeforeunload = function(e) {
    audio.play();
    e.preventDefault();
    e.returnValue = 'Ты уверен? Это будет стоить тебе 100 рублей!';
    return 'Ты уверен? Это будет стоить тебе 100 рублей!';
  };
  
  // Защита от случайного нажатия "Назад"
  setInterval(function() {
    window.history.pushState(null, null, window.location.href);
  }, 3000);
};
</script>
</body>
</html>
